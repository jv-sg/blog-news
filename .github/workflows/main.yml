name: Pipeline CI/CD
on:
  push:
    branches:
      - main
  workflow_dispatch: 
  
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Instalação do node
        uses: actions/setup-node@v4
        
        with:
          node-version: '20'
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Instalação das dependencias
        run: npm install

      - name: Rodar build
        run: npm run build

  tests:
    runs-on: ubuntu-latest
    needs: build
  
    steps:
        - name: Checkout do código
          uses: actions/checkout@v5
  
        - name: Instalação do node
          uses: actions/setup-node@v4
          
          with:
            node-version: '20'
            cache: "npm"
            cache-dependency-path: package-lock.json
  
        - name: Instalação das dependencias
          run: npm install

        - name: rodar lint
          run: npm run lint

        - name: Rodar testes
          run: npm run test
